<!DOCTYPE html>
<html>

<head>

    <title>Milaor Parcel Web GIS</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .leaflet-popup-content {
            font-size: 14px;
        }
    </style>

</head>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        var map = L.map('map').setView([13.6, 123.18], 13);

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap'
            }
        ).addTo(map);


        fetch('/api/parcels.geojson')
            .then(response => response.json())
            .then(data => {

                var parcels = L.geoJSON(data, {

                    style: {
                        color: "blue",
                        weight: 1,
                        fillColor: "#4A90E2",
                        fillOpacity: 0.25
                    },

                    onEachFeature: function (feature, layer) {

                        layer.bindPopup(`
                <b>Parcel Information</b><br><br>

                <b>Parcel ID:</b> ${feature.properties.parcelid || "N/A"}<br>

                <b>Claimant:</b> ${feature.properties.claimant || "N/A"}<br>

                <b>Barangay:</b> ${feature.properties.barangayna || "N/A"}<br>

                <b>Municipality:</b> ${feature.properties.municipali || "N/A"}<br>

                <b>Province:</b> ${feature.properties.provincena || "N/A"}<br>

                <b>Area:</b> ${feature.properties.area || "N/A"} m²
            `);

                        layer.on('click', function () {

                            this.setStyle({
                                color: 'red',
                                weight: 3,
                                fillOpacity: 0.5
                            });

                        });

                        layer.on('popupclose', function () {

                            this.setStyle({
                                color: 'blue',
                                weight: 1,
                                fillOpacity: 0.25
                            });

                        });

                    }

                }).addTo(map);

                map.fitBounds(parcels.getBounds());

            });

    </script>

</body>

</html>
